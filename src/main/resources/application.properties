spring.application.name=Board

spring.datasource.driver-class-name=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.datasource.url=jdbc:log4jdbc:mysql://localhost:3307/board?serverTimezone=Asia/Seoul&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# column name to camel case
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:/Mappers/**/*Mapper.xml


logging.level.jdbc.audit=OFF
logging.level.jdbc.resultset=OFF
logging.level.jdbc.connection=OFF
logging.level.jdbc.sqltiming=OFF
# "Loading class com.mysql.jdbc.Driver" 경고는 log4jdbc 내부 동작으로, logger 설정으로 제거 불가 (기능 영향 없음)

# change upload file size
spring.servlet.multipart.maxFileSize=10MB
spring.servlet.multipart.maxRequestSize=50MB


file.upload-path=/Users/space/develop/upload-files

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs


