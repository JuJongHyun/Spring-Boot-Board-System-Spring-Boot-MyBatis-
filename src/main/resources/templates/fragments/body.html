<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body th:fragment="main-body">
<div id="adm_wrap">
    <header>
        <div class="head">
            <h1>게시판 프로젝트</h1>
            <div th:if="${session.loginMember != null}" class="top_menu">
                <div class="login_user"><strong><i class="far fa-user-circle"></i> [[ ${session.loginMember.name} ]]</strong> 님, 환영합니다 🌸</div>
                <div class="noti_wrap" style="position:relative;display:inline-block;margin-right:12px;cursor:pointer;" onclick="toggleNotiPanel()">
                    <i class="fas fa-bell" style="font-size:18px;"></i>
                    <span id="noti_badge" style="display:none;position:absolute;top:-6px;right:-8px;background:#e74c3c;color:#fff;border-radius:50%;font-size:11px;min-width:18px;height:18px;line-height:18px;text-align:center;padding:0 3px;"></span>
                    <div id="noti_panel" style="display:none;position:absolute;right:0;top:28px;width:320px;max-height:360px;overflow-y:auto;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:999;">
                        <div style="padding:10px 14px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
                            <strong style="font-size:13px;">알림</strong>
                            <a href="javascript:void(0);" onclick="markAllAsRead(event)" style="font-size:12px;color:#888;">모두 읽음</a>
                        </div>
                        <ul id="noti_list" style="list-style:none;margin:0;padding:0;"></ul>
                        <div id="noti_empty" style="padding:20px;text-align:center;color:#aaa;font-size:13px;display:none;">새 알림이 없습니다.</div>
                    </div>
                </div>
                <div class="logout">
                    <form action="/logout" method="post">
                        <button type="submit"><span class="skip_info">로그아웃</span><i class="fas fa-sign-out-alt"></i></button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <div id="container">
        <div class="menu_toggle"><span></span></div>
        <!--/* 좌측 영역 */-->
        <div class="lcontent">
            <!--/* 메뉴 */-->
            <nav>
                <ul>
                    <li class="has_sub"><a href="javascript: void(0);"><span>게시판 관리</span></a>
                        <ul>
                            <li><a href="/post/list.do">게시판</a></li>
                        </ul>
                    </li>
                    <li class="has_sub"><a href="javascript: void(0);"><span>회원 관리</span></a>
                        <ul>
                            <li><a href="/member/mypage.do">마이페이지</a></li>
                        </ul>
                    </li>
                    <li class="has_sub" sec:authorize="hasRole('ADMIN')">
                        <a href="javascript: void(0);"><span>관리자</span></a>
                        <ul>
                            <li><a href="/admin/index.do">관리자 페이지</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>

        <!--/* 우측 영역 */-->
        <div class="rcontent">

            <!--/* 페이지별 컨텐츠 */-->
            <th:block layout:fragment="content"></th:block>

        </div>
    </div>
    <!--/* // #container */-->
    <footer>© 2025 Board Project. All rights reserved.</footer>
</div>

<script th:src="@{/js/function.js}"></script>
<script th:src="@{/js/jquery-3.6.0.min.js}"></script>
<script th:src="@{/js/common.js}"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>

<th:block layout:fragment="script"></th:block>

<th:block th:if="${session.loginMember != null}">
<script th:inline="javascript">
(function () {
    // 미읽음 알림 초기 로드
    fetch('/api/v1/notifications')
        .then(r => r.json())
        .then(res => {
            if (res.data && res.data.length > 0) {
                renderNotifications(res.data);
                updateBadge(res.data.length);
            } else {
                document.getElementById('noti_empty').style.display = 'block';
            }
        });

    // SSE 구독
    const es = new EventSource('/api/v1/notifications/subscribe');
    es.addEventListener('notification', function (e) {
        const noti = JSON.parse(e.data);
        prependNotification(noti);
        const badge = document.getElementById('noti_badge');
        const count = parseInt(badge.innerText || '0') + 1;
        updateBadge(count);
        document.getElementById('noti_empty').style.display = 'none';
    });
    es.onerror = function () { es.close(); };

    window.toggleNotiPanel = function () {
        const panel = document.getElementById('noti_panel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    };

    document.addEventListener('click', function (e) {
        const wrap = document.querySelector('.noti_wrap');
        if (wrap && !wrap.contains(e.target)) {
            document.getElementById('noti_panel').style.display = 'none';
        }
    });

    window.markAllAsRead = function (e) {
        e.stopPropagation();
        fetch('/api/v1/notifications/read-all', { method: 'PATCH' })
            .then(() => {
                document.getElementById('noti_list').innerHTML = '';
                document.getElementById('noti_empty').style.display = 'block';
                updateBadge(0);
            });
    };

    function updateBadge(count) {
        const badge = document.getElementById('noti_badge');
        if (count > 0) {
            badge.innerText = count > 99 ? '99+' : count;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    function renderNotifications(list) {
        list.forEach(n => prependNotification(n));
    }

    function prependNotification(n) {
        const ul = document.getElementById('noti_list');
        const li = document.createElement('li');
        li.style.cssText = 'padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;cursor:pointer;';
        li.dataset.id = n.id;
        li.innerHTML = '<a href="/post/view.do?id=' + n.postId + '" style="color:#333;text-decoration:none;" onclick="readNoti(event,' + n.id + ')">' + n.message + '</a>';
        ul.insertBefore(li, ul.firstChild);
    }

    window.readNoti = function (e, id) {
        fetch('/api/v1/notifications/' + id + '/read', { method: 'PATCH' });
    };
})();
</script>
</th:block>
</body>
</html>
