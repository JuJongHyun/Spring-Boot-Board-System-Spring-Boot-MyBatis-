<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="layout/basic">

    <th:block layout:fragment="title"><title>관리자 대시보드</title></th:block>

    <th:block layout:fragment="add-css">
        <style>
            .stat_grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 32px;
            }
            .stat_card {
                background: #fff;
                border: 1px solid #E3D5CA;
                border-radius: 14px;
                padding: 22px 24px;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .stat_card .stat_icon {
                width: 42px; height: 42px; border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                font-size: 18px;
            }
            .stat_card .stat_label { font-size: 13px; color: #9a8880; }
            .stat_card .stat_value { font-size: 28px; font-weight: 700; color: #3d2f2a; line-height: 1; }
            .stat_card .stat_sub   { font-size: 12px; color: #B4B4B8; }

            .icon_member   { background: #FDF0E8; color: #D7936A; }
            .icon_today    { background: #E8F4FD; color: #5AABCE; }
            .icon_post     { background: #F0F8EC; color: #72B35A; }
            .icon_comment  { background: #F5EEF8; color: #A87EC9; }

            .dash_section { margin-bottom: 32px; }
            .dash_section h4 { font-size: 15px; font-weight: 600; color: #3d2f2a; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #F0E8E0; }

            @media (max-width: 900px) { .stat_grid { grid-template-columns: repeat(2, 1fr); } }
        </style>
    </th:block>

    <th:block layout:fragment="content">
        <div class="page_tits">
            <h3>관리자 대시보드</h3>
        </div>

        <div class="content">

            <!-- 통계 카드 -->
            <div class="stat_grid">
                <div class="stat_card">
                    <div class="stat_icon icon_member"><i class="fas fa-users"></i></div>
                    <span class="stat_label">전체 회원</span>
                    <span class="stat_value" th:text="${stats.totalMembers}">0</span>
                    <span class="stat_sub">활성 회원 수</span>
                </div>
                <div class="stat_card">
                    <div class="stat_icon icon_today"><i class="fas fa-user-plus"></i></div>
                    <span class="stat_label">오늘 가입</span>
                    <span class="stat_value" th:text="${stats.todaySignups}">0</span>
                    <span class="stat_sub">금일 신규 가입</span>
                </div>
                <div class="stat_card">
                    <div class="stat_icon icon_post"><i class="fas fa-file-alt"></i></div>
                    <span class="stat_label">전체 게시글</span>
                    <span class="stat_value" th:text="${stats.totalPosts}">0</span>
                    <span class="stat_sub">삭제 제외 기준</span>
                </div>
                <div class="stat_card">
                    <div class="stat_icon icon_comment"><i class="fas fa-comment-dots"></i></div>
                    <span class="stat_label">전체 댓글</span>
                    <span class="stat_value" th:text="${stats.totalComments}">0</span>
                    <span class="stat_sub">삭제 제외 기준</span>
                </div>
            </div>

            <!-- 바로가기 -->
            <div class="dash_section">
                <h4>빠른 메뉴</h4>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <a href="/admin/members.do" class="btns btn_st3 btn_mid">
                        <i class="fas fa-users" style="margin-right:6px;"></i>회원 관리
                    </a>
                    <a href="/admin/posts.do" class="btns btn_st3 btn_mid">
                        <i class="fas fa-file-alt" style="margin-right:6px;"></i>게시글 관리
                    </a>
                    <a href="/post/list.do" class="btns btn_bdr3 btn_mid">
                        <i class="fas fa-list" style="margin-right:6px;"></i>게시판 보기
                    </a>
                </div>
            </div>

        </div>
    </th:block>

</html>
